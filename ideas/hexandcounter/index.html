<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hex &amp; Counters</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <canvas id="game"></canvas>
    <div id="hud">
        <span id="turn-info">Turn 1</span>
        <span id="mp-info">MP: 5/5</span>
        <span id="hover-info"></span>
        <button id="end-turn">End Turn</button>
        <button id="new-game">New Game</button>
    </div>
    <div id="intro-panel">
        <p>Victory condition: Move your counter (P) to the target. Good luck!</p>
        <button id="begin-btn">Begin</button>
    </div>
    <!-- NOTE! We want to be able to double-click to run these games, so use plain
    script includes (globals), not ES module imports. Order = dependency order:
    artifacts → display artifacts → libs → state → engine → ui → bootstrap. -->
    <script src="artifacts.js"></script>
    <script src="displayartifacts.js"></script>
    <script src="rando.js"></script>
    <script src="colortheory.js"></script>
    <script src="hex.js"></script>
    <script src="gamestate.js"></script>
    <script src="gameengine.js"></script>
    <script src="gameui.js"></script>
    <script src="index.js"></script>
</body>
</html>
