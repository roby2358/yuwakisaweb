<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MarkdownIsARust</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <header>
    <h1>MarkdownIsARust</h1>
    <div class="actions">
      <button id="run" class="action">Run</button>
      <button id="clear" class="action ghost">Clear</button>
    </div>
  </header>

  <div class="workspace">
    <aside class="sidebar">
      <div class="pane-title">Examples</div>
      <nav id="examples"></nav>
    </aside>

    <main>
      <section class="pane">
        <div class="pane-title">Source — Markdown</div>
        <textarea id="editor" spellcheck="false" autocomplete="off"></textarea>
      </section>

      <section class="pane right">
        <div class="pane-title">Result — diagnostics or output</div>
        <div id="results" class="pane-body"></div>
        <div class="rust-wrap">
          <div class="pane-title">Rust — transpiled</div>
          <pre id="rust"></pre>
        </div>
      </section>
    </main>
  </div>

  <!-- Plain classic scripts, loaded in order; no bundler, no modules. -->
  <script src="parser.js"></script>
  <script src="checker.js"></script>
  <script src="runner.js"></script>
  <script src="transpiler.js"></script>
  <script src="examples.js"></script>
  <script src="index.js"></script>
</body>
</html>
