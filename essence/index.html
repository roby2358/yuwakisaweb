<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="essence.css">
  <title>Plot f(x, y)</title>
</head>
<body>
<div class="container">
  <canvas id="plot" width="512" height="512"></canvas>
  <footer>
    <p>
      <label><input type="radio" name="field" value="cauchy" checked> Cauchy</label>
      <label><input type="radio" name="field" value="cosine"> Cosine</label>
    </p>
    <p><label><input type="checkbox" id="move"> Move</label></p>
    <p>Press ESCAPE to stop</p>
    <p>Click on the display to move one local maximum</p>
  </footer>
</div>
<script src="essence.js"></script>
</body>
</html>
