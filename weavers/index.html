<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weavers of Worlds: The Loom</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="app">
        <canvas id="game"></canvas>
        <div id="panel">
            <div class="panel-header">
                <h1>WEAVERS OF WORLDS</h1>
                <div class="subtitle">The Loom</div>
            </div>
            <div id="turn-info"></div>
            <div class="panel-section">
                <h3>Threads</h3>
                <div id="threads"></div>
            </div>
            <div class="panel-section">
                <h3>Weavers</h3>
                <div id="weavers"></div>
            </div>
            <div class="panel-section" id="recipe-section">
                <h3>Worlds <span id="world-count"></span></h3>
                <div id="recipes"></div>
            </div>
            <div id="actions"></div>
            <div class="panel-section">
                <h3>Chronicle</h3>
                <div id="log"></div>
            </div>
        </div>
    </div>
    <script type="module" src="index.js"></script>
</body>
</html>
